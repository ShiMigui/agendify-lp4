services:
  mysql:
    image: mysql:lts
    container_name: agendify_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports: ["${DB_PORT:-3306}:3306"]
    volumes: [mysql_data:/var/lib/mysql]

  api:
    build: ./api
    container_name: agendify_api
    restart: unless-stopped
    depends_on: [mysql]
    ports: ["8000:8000"]
    volumes:
      - ./api:/var/www/html
      - ./.env:/var/www/html/.env
    env_file: [.env]

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    restart: unless-stopped
    ports: ["8080:80"]
    environment:
      PMA_HOST: mysql
    depends_on: [mysql]

volumes:
  mysql_data:
