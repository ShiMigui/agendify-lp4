services:
  mysql:
    image: mysql:lts
    container_name: agendify_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports: ["${DB_PORT}:3306"]
    volumes: [mysql_data:/var/lib/mysql]

  api:
    build: ./api
    container_name: agendify_api
    restart: unless-stopped
    depends_on: [mysql]
    ports: ["8000:8000"]
    env_file: [.env]

volumes:
  mysql_data:
